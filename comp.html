<!DOCTYPE html>
<html lang="zh-TW" class="no-js">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORD 隊伍組成</title>
    <link rel="manifest" href="/manifest.json">
    <script src="/pwa-init.js?v=260711001"></script>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="/resource/192x192.png">
    <link rel="icon" type="image/png" href="/resource/192x192.png" />
    <link rel="stylesheet" href="/src/css/styles.css">
    <script type="module" src="/src/js/app.js"></script>
    <style>
        .team-tab-btn {
            background-color: #2a2a2a;
            /* 根據你原本的暗色背景調整 */
            color: #888;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .team-tab-btn:hover {
            color: #fff;
            border-color: #666;
        }

        .team-tab-btn.active {
            background-color: var(--primary-color, #ffd28a);
            /* 或是使用你專案的 primary color */
            color: #121212;
            border-color: var(--primary-color, #ffd28a);
            font-weight: bold;
        }
    </style>
</head>

<body data-page="comp">
    <div id="app-loading" aria-hidden="true">
        <div class="app-loading-spinner"></div>
    </div>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-title" data-i18n="page.comp.title">自訂隊伍組成</div>
                <div class="brand-subtitle"></div>
            </div>
            <my-navbar></my-navbar>
        </header>

        <div class="page-grid comp-layout">
            <!-- 隊伍面板 (左側/側邊欄) -->
            <aside class="panel team-panel">
                <div class="panel-header">
                    <h2 class="panel-title" data-i18n="page.comp.myteam">我的隊伍</h2>
                    <p class="panel-desc" data-i18n="page.comp.desc">選取角色後點擊分析</p>
                </div>
                <div class="panel-body team-body">
                    <div class="team-actions">
                        <button id="analyzeTeamBtn" class="success full-width-btn" type="button"
                            data-i18n="action.analyzeTeam">分析隊伍</button>
                        <button id="clearTeamBtn" class="secondary full-width-btn" type="button"
                            style="margin-top: 8px;" data-i18n="action.clearTeam">清空隊伍</button>
                    </div>
                    <div class="team-tabs" style="display: flex; gap: 4px; margin-bottom: 12px;">
                        <button type="button" class="team-tab-btn active" data-team-idx="0" data-i18n="team.label"
                            data-i18n-index="1" style="flex: 1; padding: 6px; font-size: 0.85rem;">隊 1</button>
                        <button type="button" class="team-tab-btn" data-team-idx="1" data-i18n="team.label"
                            data-i18n-index="2" style="flex: 1; padding: 6px; font-size: 0.85rem;">隊 2</button>
                        <button type="button" class="team-tab-btn" data-team-idx="2" data-i18n="team.label"
                            data-i18n-index="3" style="flex: 1; padding: 6px; font-size: 0.85rem;">隊 3</button>
                        <button type="button" class="team-tab-btn" data-team-idx="3" data-i18n="team.label"
                            data-i18n-index="4" style="flex: 1; padding: 6px; font-size: 0.85rem;">隊 4</button>
                        <button type="button" class="team-tab-btn" data-team-idx="4" data-i18n="team.label"
                            data-i18n-index="5" style="flex: 1; padding: 6px; font-size: 0.85rem;">隊 5</button>
                    </div>
                    <div id="selectedTeamList" class="team-list-container">
                        <div class="empty-state" data-i18n="empty.noCharacters">尚未選取任何角色。</div>
                    </div>

                    <div class="team-divider"></div>

                    <div class="team-materials-section">
                        <h3 class="materials-title" data-i18n="materials.basicMaterials">所需基礎材料</h3>
                        <div id="teamMaterialsList" class="materials-list">
                            <span class="muted" data-i18n="material.none">無</span>
                            </span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 角色篩選與列表 (右側) -->
            <main class="panel characters-panel">
                <div class="panel-header">
                    <h1 class="panel-title" data-i18n="page.comp.characters.title">角色庫</h1>
                    <p class="panel-desc"></p>
                </div>
                <div class="panel-body">
                    <!-- 篩選器 -->
                    <div class="comp-controls">
                        <div class="comp-controls-header">
                            <div>
                                <div class="field-label" data-i18n="field.searchConditions">搜尋條件</div>
                                <div class="helper-text"></div>
                            </div>
                            <div class="controls-actions comp-controls-header-actions">
                                <button id="toggleCompFiltersBtn" class="secondary" type="button" aria-expanded="true"
                                    aria-controls="compFiltersBody" data-i18n="action.collapseFilters">收合條件</button>
                                <button id="resetFiltersBtn" class="secondary" type="button"
                                    data-i18n="action.resetFilters">重置篩選</button>
                            </div>
                        </div>

                        <div id="compFiltersBody" class="comp-controls-body">
                            <div class="controls-row">
                                <div class="field-group">
                                    <span class="field-label" data-i18n="field.searchName">搜尋名稱</span>
                                    <input id="compSearchInput" class="field-input" type="text" placeholder="">
                                </div>
                            </div>

                            <div class="controls-row" style="margin-top: 14px;">
                                <div class="field-group">
                                    <span class="field-label" data-i18n="field.rarity">稀有度</span>
                                    <div id="levelCheckboxGroup" class="checkbox-badge-grid">
                                        <!-- JS 動態生成稀有度複選框 -->
                                    </div>
                                </div>
                            </div>

                            <div class="controls-row" style="margin-top: 14px;">
                                <div class="field-group">
                                    <span class="field-label" data-i18n="skill_type">技能類型</span>
                                    <div id="skillTypeCheckboxGroup" class="checkbox-badge-grid">
                                        <!-- JS 動態生成技能複選框 -->
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="controls-row" style="margin-top: 16px;">
                            <div id="compSummaryText" class="summary-text" data-i18n="loading.loading">載入中...</div>
                        </div>
                    </div>

                    <!-- 角色列表 (分組顯示) -->
                    <div id="compCharacterGroups" class="character-groups-stack">
                        <!-- JS 動態生成各等級分組 -->
                    </div>
                </div>
            </main>
        </div>
    </div>

</body>

</html>
