<!DOCTYPE html>
<html lang="zh-TW" class="no-js">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORD 資料維護</title>
  <link rel="manifest" href="/manifest.json">
  <script src="/pwa-init.js?v=260711001"></script>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/resource/192x192.png">
  <link rel="stylesheet" href="/src/css/tom-select.css">
  <link rel="stylesheet" href="/src/css/styles.css">
  <link rel="icon" type="image/png" href="/resource/192x192.png" />
  <script src="/js/tom-select.complete.min.js"></script>
  <script type="module" src="/src/js/app.js"></script>
  <script type="module" src="/src/js/shared/wc-footer.js"></script>
</head>

<body data-page="maintenance">
  <div id="app-loading" aria-hidden="true">
    <div class="app-loading-spinner"></div>
  </div>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title" data-i18n="maintenance.brand">資料維護</div>
        <div class="brand-subtitle" data-i18n="maintenance.brand_subtitle">可編輯完整欄位、增刪資料，並匯出最新 JSON</div>
      </div>
      <my-navbar></my-navbar>
    </header>

    <section class="panel">
      <div class="panel-header">
        <h1 class="panel-title" data-i18n="maintenance.page_title">資料維護</h1>
        <p class="panel-desc"></p>
      </div>
      <div class="panel-body">
        <div class="page-grid">
          <div>
            <label class="field-group">
              <span class="field-label" data-i18n="maintenance.search_label">搜尋資料</span>
              <input id="maintenanceSearchInput" class="field-input" type="text" placeholder="搜尋名稱、ID、材料"
                data-i18n-placeholder="maintenance.search_placeholder">
            </label>
            <div class="summary-bar">
              <div id="maintenanceSummary" class="summary-text">載入中...</div>
            </div>
            <div id="maintenanceList" class="record-list" style="margin-top: 14px;"></div>
          </div>

          <div>
            <div class="form-grid">
              <label class="field-group">
                <span class="field-label" data-i18n="maintenance.field.character_id">角色 / 物品 ID</span>
                <input id="fieldCharacterId" class="field-input" type="text">
              </label>

              <label class="field-group">
                <span class="field-label">稀有度</span>
                <select id="fieldLevel" class="field-select"></select>
              </label>

              <label class="field-group">
                <span class="field-label">中文名稱</span>
                <input id="fieldName" class="field-input" type="text">
              </label>

              <label class="field-group">
                <span class="field-label">KR韓文名</span>
                <input id="fieldKrName" class="field-input" type="text">
              </label>

              <label class="field-group">
                <span class="field-label">EN英文名</span>
                <input id="fieldEnName" class="field-input" type="text">
              </label>

              <label class="field-group">
                <span class="field-label">金鑰代碼</span>
                <input id="fieldKeyCode" class="field-input" type="text">
              </label>

              <label class="field-group full-span">
                <span class="field-label">組成材料</span>
                <div class="picker-shell">
                  <div class="picker-inline">
                    <select id="materialPickerSelect" class="field-select"></select>
                    <button id="clearMaterialsButton" type="button" class="secondary">清空材料</button>
                  </div>
                  <div id="fieldMaterialsChips" class="selected-chip-list"></div>
                </div>
              </label>

              <label class="field-group">
                <span class="field-label" data-i18n="maintenance.field.major">專長定位</span>
                <input id="fieldMajor" class="field-input" type="text">
              </label>

              <div class="field-group full-span">
                <span class="field-label">技能類型</span>
                <div id="fieldSkillTypesGroup" class="checkbox-badge-grid"></div>
              </div>

              <div class="field-group full-span">
                <span class="field-label" data-i18n="maintenance.field.skill_values">技能數值</span>
                <div id="fieldSkillValuesGroup" class="skill-values-list"></div>
              </div>

              <label class="field-group full-span">
                <span class="field-label">備註</span>
                <textarea id="fieldRemark" class="field-textarea"></textarea>
              </label>

              <label class="field-group full-span">
                <span class="field-label" data-i18n="maintenance.field.partner">適合搭配角色</span>
                <select id="partnerPickerSelect" class="field-select" multiple></select>
              </label>
            </div>

            <div class="controls-actions" style="margin-top: 18px;">
              <button id="saveRecordButton" type="button" class="success"
                data-i18n="maintenance.action.save">暫存</button>
              <button id="addRecordButton" type="button" data-i18n="maintenance.action.add">新增一筆</button>
              <button id="deleteRecordButton" type="button" class="danger"
                data-i18n="maintenance.action.delete">刪除此筆</button>
              <button id="exportJsonButton" type="button" class="secondary" data-i18n="maintenance.action.export">匯出
                JSON</button>
              <button style="display:none" id="resetToastButton" type="button" class="secondary">清除訊息</button>
            </div>

            <div id="maintenanceToast" class="toast"></div>

            <div class="preview-card">
              <pre id="maintenancePreview" data-i18n="maintenance.preview.placeholder">尚未選擇資料。</pre>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <my-footer></my-footer>
</body>

</html>
