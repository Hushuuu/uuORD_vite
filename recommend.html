<!DOCTYPE html>
<html lang="zh-TW" class="no-js">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORD 合成推薦</title>
  <link rel="manifest" href="/manifest.json">
  <script src="/pwa-init.js?v=260711001"></script>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/resource/192x192.png">
  <link rel="stylesheet" href="/src/css/tom-select.css">
  <link rel="stylesheet" href="/src/css/styles.css">
  <script src="/js/tom-select.complete.min.js"></script>
  <script type="module" src="/src/js/app.js"></script>
  <style>
    /* 2. 頂部進度條外殼（灰色軌道） */
    .card-top-progress-container {
      width: 100%;
      height: 4px;
      /* 裝飾條寬度，4px ~ 6px 最精緻 */
      background-color: rgba(0, 0, 0, 0.08);
      /* 淡淡的灰色軌道，亦可改成 transparent 完全隱形 */
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
      /* 確保在最上層 */
    }

    /* 3. 頂部進度條主體（充滿漸層色） */
    .card-top-progress-bar {
      height: 100%;
      /* 航海王/手遊風的經典亮眼漸層（從極光青綠到活力橘紅，你可以依喜好調整顏色） */
      background: linear-gradient(90deg, #11998e 0%, #38ef7d 50%, #ff9f43 100%);

      /* 如果希望進度條帶有一點發光質感，可以加上這行（選用） */
      box-shadow: 0 1px 4px rgba(56, 239, 125, 0.5);

      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      /* 讓進度條抽動時更滑順 */
    }

    /* 4. 微調：因為頂部多了 4px 的條，你原本的 card-top 可以適度補一點 padding-top */
    .recommend-card-top {
      padding-top: 12px;
      /* 依你實際視覺畫面微調，避免文字離頂部太近 */
    }

    .field-group.collapsed {
      display: none;
    }

    .collapsed {
      display: none;
    }

    .recommend-level-tab {
      background-color: #2a2a2a;
      color: #888;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      width: 80px;
      margin-top: 5px;
      margin-bottom: 5px;
      padding: 5px;
    }

    .recommend-level-tab.active {
      background-color: var(--primary-color, #ffd28a);
      color: #121212;
      border-color: var(--primary-color, #ffd28a);
      font-weight: bold;
    }
  </style>
</head>

<body data-page="recommend">
  <div id="app-loading" aria-hidden="true"><div class="app-loading-spinner"></div></div>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title" data-i18n="recommend.brand">合成推薦</div>
        <div class="brand-subtitle" data-i18n="recommend.brand_subtitle">根據現有角色，推薦最接近的合成</div>
      </div>
      <my-navbar></my-navbar>
    </header>

    <section class="panel">
      <!-- <div class="panel-header">
        <h1 class="panel-title"></h1>
        <p class="panel-desc"></p>
      </div> -->
      <div class="panel-body">
        <div class="controls-grid">
          <div class="field-group" style="grid-column: span 4;">
            <span class="field-label" data-i18n="recommend.target_rarity">目標稀有度</span>
            <div id="recommendTargetLevelGrid" class="checkbox-badge-grid recommend-target-grid"></div>
          </div>
          <div class="field-group" style="grid-column: span 4;">
            <span class="field-label" data-i18n="recommend.target_skill_type">技能類型</span>
            <div id="recommendTargetSkillGrid" class="checkbox-badge-grid recommend-target-grid"></div>
          </div>
          <div class="field-group" style="grid-column: span 3;">
            <span class="field-label" data-i18n="recommend.owned_characters">擁有其他角色</span>
            <select id="recommendOwnedSelect" multiple class=""></select>
            <div class="helper-text"></div>
          </div>
          <div class="field-group">
            <span class="field-label" data-i18n="field.actions">操作</span>
            <div class="controls-actions">
              <button id="recommendRefreshBtn" type="button" data-i18n="recommend.action.refresh">重新推薦</button>
              <button id="recommendResetBtn" type="button" class="secondary" data-i18n="action.reset">重置條件</button>
              <button id="collapseFilterBtn" type="button" class="secondary" data-i18n="action.collapseFilters">收合條件</button>
            </div>
          </div>
        </div>

        <div class="summary-bar">
          <div id="recommendSummary" class="summary-text"></div>
          <div class="helper-text"></div>
        </div>

        <div class="recommend-grid">
          <section class="panel" style="margin-top: 12px;">
            <div class="panel-header">
              <h2 class="panel-title" id="recommendOwnedTitle" data-i18n="recommend.owned_title">
                擁有基本角色
                <img src="/resource/arrow_drop_down.svg" />
              </h2>
            </div>
            <div id="recommendOwnedTabs" class="recommend-owned-tabs"></div>
            <div id="recommendOwnedPanels" class="recommend-owned-panels"></div>
          </section>

          <section class="panel" style="margin-top: 12px;">
            <div class="panel-header">
              <h2 class="panel-title" data-i18n="recommend.result_title">推薦結果</h2>
              <p class="panel-desc" data-i18n="recommend.result_desc">顯示前10個建議，點x可推薦其他角色</p>
            </div>
            <div id="recommendLevelTab" style="margin: 10px 0 10px 5px;"></div>
            <div id="recommendResultList" class="recommend-result-list"></div>
          </section>
        </div>
      </div>
    </section>
  </div>

</body>

</html>
